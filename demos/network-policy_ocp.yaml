name: OpenShift Network Policy Demo

repo: https://github.com/osa-ora/ocp-network-policy-demo
port: 8080

prerequisites:
  steps:
    - type: check_available
      command: oc
      args: ["version", "--client"]

    - type: check_available
      command: oc
      args: ["whoami"]

install:
  steps:

    - type: oc_command
      command: delete project db-project
      ignore_error: true

    - type: oc_command
      command: delete project app-project
      ignore_error: true

    - type: oc_command
      command: new-project db-project

    - type: oc_command
      command: new-app mysql-persistent -p DATABASE_SERVICE_NAME=loyaltymysql -p MYSQL_ROOT_PASSWORD=loyalty -p MYSQL_DATABASE=loyalty -p MYSQL_USER=loyalty -p MYSQL_PASSWORD=loyalty -p MEMORY_LIMIT=512Mi -p VOLUME_CAPACITY=512Mi -n db-project

    - type: oc_command
      command: patch dc loyaltymysql -n db-project --type=json -p='[{"op":"add","path":"/spec/template/metadata/labels/app","value":"loyaltymysql"}]'

    - type: oc_command
      command: wait --for=condition=available dc/loyaltymysql -n db-project --timeout=300s

    - type: oc_command
      command: exec $(oc get pods -l=name=loyaltymysql -n db-project -o jsonpath='{.items[0].metadata.name}') -n db-project -- mysql -u root loyalty -e "CREATE TABLE loyalty_account (id INT NOT NULL AUTO_INCREMENT,balance INT NULL,tier INT NULL,enabled TINYINT NULL, PRIMARY KEY (id)); CREATE TABLE loyalty_transaction (id INT NOT NULL AUTO_INCREMENT,account_id INT NULL,points INT NULL,name VARCHAR(45) NULL,date DATETIME NULL,PRIMARY KEY(id)); INSERT INTO loyalty_account VALUES (1,333,1,1),(2,122,1,1),(3,100,2,1); INSERT INTO loyalty_transaction VALUES (1,1,100,'KFC','2019-01-19 14:55:02'),(2,1,80,'Carrefour','2020-01-19 14:55:02'),(3,1,75,'Car Wash','2020-02-19 14:55:02'),(4,2,110,'PizzaHut','2020-01-19 14:55:02');"

    - type: oc_command
      command: new-project app-project

    - type: oc_command
      command: new-app registry.access.redhat.com/redhat-openjdk-18/openjdk18-openshift~https://github.com/osa-ora/Loyalty-Service.git --name=quarkus-loyalty-java -n app-project

    - type: oc_command
      command: set env deployment/quarkus-loyalty-java DB_IP=loyaltymysql.db-project.svc.cluster.local -n app-project

    - type: oc_command
      command: expose service/quarkus-loyalty-java -n app-project

    - type: oc_command
      command: patch deployment quarkus-loyalty-java -n app-project --type=json -p='[{"op":"add","path":"/spec/template/metadata/labels/deployment","value":"quarkus-loyalty-java"},{"op":"add","path":"/spec/template/metadata/labels/app","value":"quarkus-loyalty-java"}]'

    - type: oc_command
      command: label namespace app-project name=app-project

    - type: oc_command
      command: wait --for=condition=available deployment/quarkus-loyalty-java -n app-project --timeout=300s

    - type: oc_command
      command: get route quarkus-loyalty-java -n app-project -o jsonpath='{.spec.host}'
      register: LOYALTY_ROUTE

    - type: shell_command
      command: curl -s -f http://{{LOYALTY_ROUTE}}/loyalty/v1/balance/1
      
run:
  steps:
    - type: oc_command
      command: delete -f https://raw.githubusercontent.com/osa-ora/ocp-network-policy-demo/refs/heads/main/policies/deny-all.yaml -n db-project
      ignore_error: true

    - type: oc_command
      command: delete -f https://raw.githubusercontent.com/osa-ora/ocp-network-policy-demo/refs/heads/main/policies/permit-policy.yaml -n db-project
      ignore_error: true

    - type: oc_command
      command: rollout restart deployment/quarkus-loyalty-java -n app-project

    - type: oc_command
      command: wait --for=condition=available deployment/quarkus-loyalty-java -n app-project --timeout=180s

    - type: oc_command
      command: get route quarkus-loyalty-java -n app-project -o jsonpath='{.spec.host}'
      register: LOYALTY_ROUTE
    
    - type: echo
      message: "Test Case 1: Testing connectivity using the default (expected success) ..."
      
    - type: curl
      url: "http://{{LOYALTY_ROUTE}}/loyalty/v1/balance/1"
      
    - type: oc_command
      command: apply -f https://raw.githubusercontent.com/osa-ora/ocp-network-policy-demo/refs/heads/main/policies/deny-all.yaml -n db-project

    - type: oc_command
      command: rollout restart deployment/quarkus-loyalty-java -n app-project

    - type: oc_command
      command: wait --for=condition=available deployment/quarkus-loyalty-java -n app-project --timeout=180s
      
    - type: echo
      message: "Test Case 2: Testing connectivity after deny-all policy (expected failure) ..."
      
    - type: curl
      url: "http://{{LOYALTY_ROUTE}}/loyalty/v1/balance/1"
      ignore_error: true
      
    - type: oc_command
      command: apply -f https://raw.githubusercontent.com/osa-ora/ocp-network-policy-demo/refs/heads/main/policies/permit-policy.yaml -n db-project

    - type: oc_command
      command: rollout restart deployment/quarkus-loyalty-java -n app-project

    - type: oc_command
      command: wait --for=condition=available deployment/quarkus-loyalty-java -n app-project --timeout=180s
      
    - type: echo
      message: "Test Case 3: Testing connectivity after selective permit policy (expected success) ..."
      
    - type: curl
      url: "http://{{LOYALTY_ROUTE}}/loyalty/v1/balance/1"
      
health:
  steps:
    - type: oc_command
      command: get route quarkus-loyalty-java -n app-project -o jsonpath='{.spec.host}'
      register: LOYALTY_ROUTE
      
    - type: health
      url: "http://{{LOYALTY_ROUTE}}/loyalty/v1/balance/1"
      retries: 10
      delay_seconds: 3


cleanup:
  steps:

    - type: oc_command
      command: delete project db-project

    - type: oc_command
      command: delete project app-project
